name: CI
on: [push, pull_request]
jobs:
  primary-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make -C firmware/primary test
  safety-monitor-firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make -C firmware/safety_monitor test
  ros2:
    runs-on: ubuntu-latest
    container: ros:humble
    steps:
      - uses: actions/checkout@v4
      - shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          colcon build
          colcon test
          colcon test-result --verbose
  scenario-regression:
    runs-on: ubuntu-latest
    needs: [ros2, primary-firmware, safety-monitor-firmware]
    steps:
      - uses: actions/checkout@v4
      - run: python3 scripts/run_scenarios.py scenarios/scenario_manifest.yaml
